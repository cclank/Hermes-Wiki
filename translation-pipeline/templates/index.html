<!DOCTYPE html>
<html>
<head>
    <title>Hermes Translation Pipeline</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #log { height: 200px; overflow-y: scroll; background: #212529; color: #0f0; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Hermes Translation Pipeline UI</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">Translate Repository</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Owner</label>
                            <input type="text" id="owner" class="form-control" placeholder="scapedotes">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Repository</label>
                            <input type="text" id="repo" class="form-control" placeholder="Hermes-Wiki">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="force">
                            <label class="form-check-label">Force re-translate (ignore cache/existing)</label>
                        </div>
                        <button class="btn btn-success" onclick="startTranslation()">Start Translation</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">Upload & Translate Single File</div>
                    <div class="card-body">
                        <input type="file" id="fileInput" class="form-control mb-3">
                        <button class="btn btn-primary" onclick="uploadFile()">Upload & Translate</button>
                        <div id="downloadLink" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-dark text-white">Active Tasks & Progress</div>
            <div class="card-body">
                <div id="tasksList"></div>
                <div id="log" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function startTranslation() {
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const force = document.getElementById('force').checked;
            
            log(`Starting translation for ${owner}/${repo}...`);
            const res = await fetch('/translate-repo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ owner, repo, force })
            });
            const data = await res.json();
            if (data.task_id) {
                log(`Task created: ${data.task_id}`);
                monitorTask(data.task_id);
            } else {
                log(`Error: ${data.error}`);
            }
        }

        function monitorTask(taskId) {
            const interval = setInterval(async () => {
                const res = await fetch(`/task-status/${taskId}`);
                const task = await res.json();
                
                const taskDiv = document.getElementById('tasksList');
                taskDiv.innerHTML = `
                    <div class="alert alert-secondary">
                        <strong>Task:</strong> ${taskId} <br>
                        <strong>Status:</strong> ${task.status} <br>
                        <strong>Progress:</strong> ${task.progress.completed} / ${task.progress.total}
                    </div>
                `;

                if (task.status === 'completed' || task.status === 'failed') {
                    clearInterval(interval);
                    log(`Task ${taskId} ${task.status}!`);
                }
            }, 2000);
        }

        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (input.files.length === 0) return;
            
            const formData = new FormData();
            formData.append('file', input.files[0]);
            
            log(`Uploading ${input.files[0].name}...`);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.translated) {
                log(`Translation success!`);
                const blob = new Blob([data.translated], {type: 'text/markdown'});
                const url = URL.createObjectURL(blob);
                document.getElementById('downloadLink').innerHTML = `<a href="${url}" download="${data.filename.replace('.md', '-en.md')}" class="btn btn-outline-primary">Download Result</a>`;
            } else {
                log(`Error: ${data.error}`);
            }
        }
    </script>
</body>
</html>
